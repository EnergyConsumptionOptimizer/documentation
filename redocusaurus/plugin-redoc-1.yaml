openapi: 3.0.0
info:
  version: 1.0.0
  title: Smart Furniture Hookup Service API
  description: >-
    API documentation for Smart Furniture Hookup Service - manages smart
    furniture hookup devices and their configurations
servers:
  - url: /
security:
  - cookieAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: authToken
  schemas: {}
  parameters: {}
paths:
  /health:
    get:
      tags:
        - Health
      security: []
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
  /api/smart-furniture-hookups:
    get:
      tags:
        - Smart Furniture Hookups
      summary: Get all smart furniture hookups
      responses:
        '200':
          description: List of smart furniture hookups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  smartFurnitureHookups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        utilityType:
                          type: string
                        endpoint:
                          type: string
                      required:
                        - id
                        - name
                        - utilityType
                        - endpoint
                required:
                  - smartFurnitureHookups
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
    post:
      tags:
        - Smart Furniture Hookups
      summary: Create a new smart furniture hookup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                utilityType:
                  type: string
                  minLength: 1
                endpoint:
                  type: string
                  minLength: 1
              required:
                - name
                - utilityType
                - endpoint
      responses:
        '201':
          description: Smart furniture hookup created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  utilityType:
                    type: string
                  endpoint:
                    type: string
                required:
                  - id
                  - name
                  - utilityType
                  - endpoint
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
  /api/smart-furniture-hookups/{id}:
    get:
      tags:
        - Smart Furniture Hookups
      summary: Get a specific smart furniture hookup by ID
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Smart furniture hookup retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  utilityType:
                    type: string
                  endpoint:
                    type: string
                required:
                  - id
                  - name
                  - utilityType
                  - endpoint
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
        '404':
          description: Smart furniture hookup not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
    patch:
      tags:
        - Smart Furniture Hookups
      summary: Update a smart furniture hookup
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                endpoint:
                  type: string
                  minLength: 1
      responses:
        '201':
          description: Smart furniture hookup updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  utilityType:
                    type: string
                  endpoint:
                    type: string
                required:
                  - id
                  - name
                  - utilityType
                  - endpoint
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
        '404':
          description: Smart furniture hookup not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
    delete:
      tags:
        - Smart Furniture Hookups
      summary: Delete a smart furniture hookup
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: id
          in: path
      responses:
        '204':
          description: >-
            Smart furniture hookup deleted successfully (Note: Implementation
            returns JSON body despite 204 status)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        '401':
          description: Unauthorized - Admin access required
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
        '404':
          description: Smart furniture hookup not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
  /api/internal/smart-furniture-hookups/{id}:
    get:
      tags:
        - Internal
      security: []
      summary: Get a specific smart furniture hookup by ID (internal)
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Smart furniture hookup retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  utilityType:
                    type: string
                  endpoint:
                    type: string
                required:
                  - id
                  - name
                  - utilityType
                  - endpoint
        '404':
          description: Smart furniture hookup not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  error:
                    type: string
                required:
                  - message
