openapi: 3.0.0
info:
  version: 1.0.0
  title: Notification Service API
  description: API documentation for Notification Service microservice
servers:
  - url: /
security:
  - cookieAuth: []
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: authToken
  schemas: {}
  parameters: {}
paths:
  /api/internal/notifications:
    post:
      tags:
        - Internal - Notifications
      summary: Create a new notification (internal endpoint)
      security: []
      description: >-
        Creates and sends a new notification. May suppress notification if spam
        mitigation policy applies.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                thresholdId:
                  type: string
                  minLength: 1
                thresholdName:
                  type: string
                  minLength: 1
                utilityType:
                  type: string
                  minLength: 1
                thresholdType:
                  type: string
                  minLength: 1
                periodType:
                  type: string
                limitValue:
                  type: number
                detectedValue:
                  type: number
              required:
                - thresholdId
                - thresholdName
                - utilityType
                - thresholdType
                - limitValue
                - detectedValue
      responses:
        '200':
          description: Notification suppressed by spam mitigation policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                required:
                  - success
                  - message
        '201':
          description: Notification created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                    required:
                      - id
                required:
                  - success
                  - data
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
  /api/notifications:
    get:
      tags:
        - Notifications
      summary: Get all notifications
      description: Retrieves all notifications for the authenticated user.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Successfully retrieved notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                          enum:
                            - PENDING
                            - SENT
                            - FAILED
                        message:
                          type: string
                        createdAt:
                          type: string
                        sentAt:
                          type: string
                          nullable: true
                        failReason:
                          type: string
                          nullable: true
                        readAt:
                          type: string
                          nullable: true
                        isRead:
                          type: boolean
                        details:
                          type: object
                          properties:
                            utility:
                              type: string
                            limit:
                              type: number
                            detected:
                              type: number
                            thresholdName:
                              type: string
                            periodType:
                              type: string
                          required:
                            - utility
                            - limit
                            - detected
                            - thresholdName
                      required:
                        - id
                        - status
                        - message
                        - createdAt
                        - sentAt
                        - failReason
                        - readAt
                        - isRead
                        - details
                required:
                  - success
                  - data
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
    delete:
      tags:
        - Notifications
      summary: Delete all notifications (admin only)
      description: Deletes all notifications in the system. Requires admin privileges.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: All notifications deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '401':
          description: Unauthorized - Admin authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
  /api/notifications/{id}:
    get:
      tags:
        - Notifications
      summary: Get notification by ID
      description: Retrieves a single notification by its identifier.
      security:
        - cookieAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Successfully retrieved notification
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                        enum:
                          - PENDING
                          - SENT
                          - FAILED
                      message:
                        type: string
                      createdAt:
                        type: string
                      sentAt:
                        type: string
                        nullable: true
                      failReason:
                        type: string
                        nullable: true
                      readAt:
                        type: string
                        nullable: true
                      isRead:
                        type: boolean
                      details:
                        type: object
                        properties:
                          utility:
                            type: string
                          limit:
                            type: number
                          detected:
                            type: number
                          thresholdName:
                            type: string
                          periodType:
                            type: string
                        required:
                          - utility
                          - limit
                          - detected
                          - thresholdName
                    required:
                      - id
                      - status
                      - message
                      - createdAt
                      - sentAt
                      - failReason
                      - readAt
                      - isRead
                      - details
                required:
                  - success
                  - data
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
    patch:
      tags:
        - Notifications
      summary: Update notification read state
      description: Updates the read state of a specific notification.
      security:
        - cookieAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                read:
                  type: boolean
              required:
                - read
      responses:
        '204':
          description: Read state updated successfully
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
    delete:
      tags:
        - Notifications
      summary: Delete notification by ID (admin only)
      description: >-
        Deletes a specific notification by its identifier. Requires admin
        privileges.
      security:
        - cookieAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        '401':
          description: Unauthorized - Admin authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
  /api/notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: Get unread notifications count
      description: Returns the count of unread notifications for the authenticated user.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Successfully retrieved unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      count:
                        type: number
                    required:
                      - count
                required:
                  - success
                  - data
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
  /api/notifications/stream:
    get:
      tags:
        - Notifications
      summary: Subscribe to real-time notifications via SSE
      description: >-
        Establishes a Server-Sent Events (SSE) connection for receiving
        real-time real-time notifications.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: SSE connection established
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  event:
                    type: string
                  data:
                    type: string
                required:
                  - event
                  - data
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                required:
                  - success
                  - error
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the service.
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
